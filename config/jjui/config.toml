[revisions]
template = 'logline'

[keys]
quit = ["q", "esc"]

[ui.colors]
"selected" = { bg = "236" }
"revisions details selected" = { bg = "236" }
"revset completion selected" = { fg = "cyan", bg = "236" }
"picker selected" = { fg = "cyan", bg = "236" }

[custom_commands]
"jj push" = { key_sequence = ["x", "p"], args = ["push"] }
"jj push selected bookmark(s)" = { key_sequence = ["x", "P"], args = ["push", "-r", "$change_id", "--allow-new"] }
"tug" = { key = ["T"], args = ["tug"] }
"newlane" = { key_sequence = ["x", "l"], args = ["newlane", "-r", "$checked_commit_ids"] }
"unlane" = { key_sequence = ["x", "L"], args = ["unlane", "$checked_commit_ids"] }

[custom_commands.edit]
key = ["E"]
args = ["util", "exec", "--", "bash", "-c", 'nvim "$(jj file list "$1")"', "", "$file"]
show="interactive"

[custom_commands.copy_commit_hash]
key  = ["Y"]
desc = "Copy selected commit hash to clipboard"
lua = '''
  -- Get the currently selected change (revision) in the main revisions list
  local change_id = revisions.current()
  if not change_id then
    flash("No revision selected")
    return
  end

  -- Ask jj for the commit id corresponding to that selected change/revision
  -- jj{...} returns (output, err)
  local out, err = jj{ "log", "-r", change_id, "-T", "commit_id", "--no-graph" }
  if err and err ~= "" then
    flash("jj error: " .. err)
    return
  end

  -- Trim whitespace/newlines and take the first line just in case
  local commit_id = (out or ""):gsub("^%s+", ""):gsub("%s+$", "")
  commit_id = commit_id:match("([^\n]+)") or commit_id

  if commit_id == "" then
    flash("Could not resolve commit id")
    return
  end

  -- Copy to clipboard using jjui built-in helper
  local ok, err = copy_to_clipboard(commit_id)
  if ok then
    flash("Copied commit id: " .. commit_id)
  else
    flash("Error copying commit id: " .. err)
  end

  -- Copy to tmux buffer
  local out, err = jj{ "util", "exec", "--", "bash", "-c", "echo $@ | tmux load-buffer -", "", commit_id }
  if err and err ~= "" then
    flash("tmux load-buffer error: " .. err)
  end
'''
